<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription Audio</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="toolbar">
        <div class="toolbar-left">
            <h1>🎙️ Transcription</h1>
        </div>
        <div class="toolbar-center">
            <div class="status" id="status">Chargement du modèle…</div>
            <span class="mode-indicator" id="modeIndicator" style="display:none;">⚡ Mode commande</span>
        </div>
        <div class="toolbar-right">
            <button id="toggleBtn" class="btn btn-start" disabled>Chargement…</button>
        </div>
    </header>

    <main>
        <textarea id="output" readonly placeholder="Le texte transcrit apparaîtra ici…"></textarea>
        <div id="partial" class="partial"></div>
    </main>

    <script src="/app.js?v=9"></script>
</body>
</html>
